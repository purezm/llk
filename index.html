<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>连连看小游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 游戏规则弹窗 -->
    <div id="rules-modal" class="modal">
        <div class="modal-content">
            <h2>游戏规则</h2>
            <p>1. 点击两个相同颜色的方块，如果它们之间可以用不超过两个拐角的直线连接，则消除它们。</p>
            <p>2. 消除所有方块后进入下一关。</p>
            <p>3. 如果无路可走，则游戏失败，回到第一关。</p>
            <p>4. 点击"提示"按钮可以获得可消除方块的提示。</p>
            <p>5. 点击"新游戏"按钮可以重新开始游戏。</p>
            <button id="close-rules">我知道了</button>
        </div>
    </div>

    <!-- 游戏容器 -->
    <div class="game-container">
        <!-- 数据显示面板 -->
        <div class="data-panel">
            <div class="data-item">
                <span class="label">当前分数:</span>
                <span id="current-score" class="value">0</span>
            </div>
            <div class="data-item">
                <span class="label">全球最高分:</span>
                <span id="global-highscore" class="value">0</span>
            </div>
            <div class="data-item">
                <span class="label">个人最高分:</span>
                <span id="personal-highscore" class="value">0</span>
            </div>
            <div class="data-item">
                <span class="label">关卡:</span>
                <span id="level" class="value">1</span>
            </div>
            <div class="data-item">
                <span class="label">剩余方块:</span>
                <span id="remaining-blocks" class="value">256</span>
            </div>
        </div>

        <!-- 游戏控制按钮 -->
        <div class="control-panel">
            <button id="new-game">新游戏</button>
            <button id="hint">提示</button>
            <button id="music-toggle">音乐: 开</button>
            <button id="sound-toggle">音效: 开</button>
        </div>

        <!-- 游戏区域 -->
        <div id="game-board" class="game-board"></div>

        <!-- 游戏结束/胜利提示 -->
        <div id="game-over" class="modal">
            <div class="modal-content">
                <h2>游戏失败</h2>
                <p>无路可走，游戏失败！</p>
                <button id="restart-game">重新开始</button>
            </div>
        </div>

        <div id="level-clear" class="modal">
            <div class="modal-content">
                <h2>关卡完成！</h2>
                <p>恭喜你完成了第 <span id="completed-level">1</span> 关！</p>
                <button id="next-level">下一关</button>
            </div>
        </div>
    </div>

    <!-- 礼花特效容器 -->
    <div id="fireworks-container"></div>

    <!-- 音效元素 -->
    <audio id="match-sound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3" type="audio/mpeg">
    </audio>
    <audio id="error-sound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3" type="audio/mpeg">
    </audio>
    <audio id="background-music" preload="auto" loop>
        <source src="https://assets.mixkit.co/music/preview/mixkit-jazz-funk-with-trumpet-329.mp3" type="audio/mpeg">
    </audio>

    <script src="game.js"></script>
</body>
</html>
