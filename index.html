<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>彩色连连看</title>
  <style>
    :root{
      --panel-height:72px;
      --tile-gap:4px;
      --effect-duration:200ms;
    }
  html,body{height:100%;margin:0;font-family:'Comic Sans MS','Microsoft YaHei',Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#f2e0ff,#ead6ff);color:#222;}
  .container{display:flex;flex-direction:column;height:100%;max-width:1200px;margin:0 auto;padding:12px;box-sizing:border-box;position:relative;z-index:1}
    header{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .stats{display:flex;gap:12px;align-items:center}
    .stat{background:rgba(255,255,255,0.04);padding:8px 10px;border-radius:6px;min-width:110px;text-align:center}
  .controls{display:flex;gap:8px;align-items:center}
  .btn{background:linear-gradient(180deg,#fff,#f2e8ff);color:#2b0836;border:0;padding:8px 10px;border-radius:12px;cursor:pointer;font-weight:700;box-shadow:0 6px 18px rgba(103,58,183,0.14);display:inline-flex;align-items:center;gap:8px}
  .btn.small{padding:6px 8px;font-size:14px}
  .btn.toggle{background:linear-gradient(180deg,#fff8f8,#fff);}
  .btn:active{transform:translateY(1px)}
  .btn .icon{width:18px;height:18px;display:inline-block;border-radius:4px;background:rgba(0,0,0,0.06)}
  .btn span{display:inline-block;white-space:nowrap}
    main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;margin-top:8px}
    .board-wrap{position:relative;display:flex;flex-direction:column;align-items:center}
  .grid{display:grid;background:linear-gradient(180deg,#f0e0ff,#e6d6ff);padding:var(--tile-gap);border-radius:8px;box-shadow:0 6px 30px rgba(0,0,0,0.06);width:min(92vw,960px);max-width:960px}
  .tile{aspect-ratio:1/1;width:100%;max-width:64px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 150ms,opacity 250ms,box-shadow 150ms,outline 150ms;box-shadow:0 2px 0 rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.04);} 
  .tile.hidden{opacity:0;transform:scale(0.2);pointer-events:none}
  .tile.selected{transform:scale(1.06);box-shadow:0 6px 18px rgba(103,58,183,0.18), 0 0 0 4px rgba(103,58,183,0.18) inset;outline:3px solid rgba(103,58,183,0.18)}
  .tile.hint{outline:4px solid rgba(255,255,255,0.95);box-shadow:0 10px 26px rgba(103,58,183,0.16);animation:tileShake 700ms ease-in-out;transform-origin:center}
  @keyframes tileShake{0%{transform:translateX(0) scale(1.03)}20%{transform:translateX(-8px) scale(1.04)}40%{transform:translateX(8px) scale(1.04)}60%{transform:translateX(-4px) scale(1.03)}80%{transform:translateX(3px) scale(1.03)}100%{transform:translateX(0) scale(1.03)}}
  .stat{background:linear-gradient(180deg,rgba(255,255,255,0.95),rgba(246,236,255,0.9));color:#222;padding:8px 10px;border-radius:10px;min-width:110px;text-align:center;box-shadow:0 6px 18px rgba(103,58,183,0.06)}
    /* responsive */
    @media (max-width:800px){
      .container{padding:8px}
      .grid{width:92vw;}
      .tile{max-width:calc(92vw / 8);} /* allow tiles to expand for mobile 8 columns */
      :root{--panel-height:88px}
      /* make buttons and stats more touch-friendly on narrow screens */
      .btn{padding:8px 10px;font-size:15px}
      .btn.small{padding:6px 8px;font-size:13px}
      .stat{min-width:84px;padding:6px 8px}
    }
    @media (max-width:480px){
      .tile{max-width:calc(92vw / 8)}
      .btn{padding:7px 10px;font-size:14px}
      .stat{min-width:72px;padding:6px 8px;font-size:13px}
    }
    /* rules modal */
    .modal-backdrop{position:fixed;inset:0;background:linear-gradient(0deg,rgba(0,0,0,0.6),rgba(0,0,0,0.8));display:flex;align-items:center;justify-content:center;z-index:1000}
    .modal{background:#0e1214;color:#eaeaea;padding:18px;border-radius:12px;max-width:720px;box-shadow:0 10px 40px rgba(0,0,0,0.7)}
    .modal h2{margin-top:0}
    .topbar{display:flex;gap:8px;align-items:center}

  /* bubble background */
  .bubbles{position:fixed;left:0;top:0;right:0;bottom:0;pointer-events:none;z-index:3}
  .bubble{position:absolute;border-radius:50%;background:rgba(255,255,255,0.6);box-shadow:inset -6px -6px 20px rgba(0,0,0,0.04);pointer-events:auto;cursor:pointer;transition:transform 220ms,opacity 220ms}
  .bubble.pop{transform:scale(1.8);opacity:0}
  .bubble-frag{position:absolute;border-radius:50%;pointer-events:none;opacity:1;transform:translate(0,0) scale(1);transition:transform 520ms cubic-bezier(.2,.8,.2,1),opacity 520ms;box-shadow:0 6px 14px rgba(0,0,0,0.12);z-index:4}
  @keyframes bubbleFloat{from{transform:translateY(0)}to{transform:translateY(-85vh)}}

  /* ensure control/header are above bubbles */
  header{position:relative;z-index:5}
  main{position:relative;z-index:2}

  /* canvas overlay for fireworks */
  canvas#fx{position:fixed;left:0;top:0;width:100%;height:100%;pointer-events:none;z-index:1200}

  footer{margin-top:8px;text-align:center;color:#555;font-size:13px}
  /* level clear overlay */
  .level-clear{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:1300;pointer-events:auto}
  .level-clear .panel{background:rgba(255,255,255,0.95);padding:18px;border-radius:12px;box-shadow:0 14px 40px rgba(0,0,0,0.18);text-align:center}
  .level-clear .panel h3{margin:0 0 8px 0;color:#4b0f6b}
  </style>
  <!-- 使用本地卡通字体：Comic Sans MS（Windows 系统通常内置，无需联网） -->
</head>
<body>
  <div class="bubbles" id="bubbles"></div>
  <div class="container">
    <header>
      <div class="topbar">
        <h1 style="margin:0;font-size:30px;color:#4b0f6b">彩色连连看</h1>
      </div>
      <div class="stats">
        <div class="stat">当前分数<br><strong id="score">0</strong></div>
        <div class="stat">个人最高分<br><strong id="personalHigh">0</strong></div>
        <div class="stat">关卡<br><strong id="level">1</strong></div>
        <div class="stat">剩余方块<br><strong id="remaining">0</strong></div>
      </div>
      <div class="controls">
        <button id="newGameBtn" class="btn"><span class="icon"></span><span>新游戏</span></button>
        <button id="hintBtn" class="btn"><span class="icon"></span><span>提示</span></button>
        <button id="musicToggle" class="btn toggle small"><span class="icon"></span><span>音乐: <strong id="musicState">开</strong></span></button>
        <button id="sfxToggle" class="btn toggle small"><span class="icon"></span><span>音效: <strong id="sfxState">开</strong></span></button>
      </div>
    </header>

    <main>
      <div class="board-wrap">
        <div id="grid" class="grid"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <div style="color:#aaa;font-size:13px">提示：点击两个相同颜色且最多两次拐角可连通的方块即可消除</div>
      </div>
    </main>

  <footer>说明弹窗将仅在首次访问时显示。</footer>
  </div>

  <canvas id="fx"></canvas>

  <div class="level-clear" id="levelClear">
    <div class="panel">
      <h3>恭喜过关！</h3>
      <div style="margin:10px 0">如果结局不能让你满意，那就还不是结局，继续努力吧！</div>
      <div style="display:flex;gap:8px;justify-content:center">
        <button id="nextLevelBtn" class="btn">我还要玩</button>
        <button id="restartBtn" class="btn">重新开始</button>
      </div>
    </div>
  </div>

  <div id="rulesModal" class="modal-backdrop" style="display:none">
    <div class="modal">
      <h2>游戏规则与说明</h2>
      <ol>
        <li>规则：点击两个相同颜色的方块，如果它们之间可以通过不超过两次拐角的直线连接（连接路径可经过空位）则方块被消除。</li>
        <li>胜利：消除全部方块进入下一关（关卡无限递增）；失败则回到第一关。</li>
        <li>新游戏：你将重新开始。</li>
        <li>提示：提供一个可消除的配对。</li>
      </ol>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">
        <label style="font-size:13px"><input id="dontShow" type="checkbox"> 不再显示</label>
        <button id="closeRules">开始游戏</button>
      </div>
    </div>
  </div>

  <script>
  // 单文件连连看实现
  (function(){
    // --- 配置 ---
    const COLORS = ['#A4E2C6','#EDB79C','#9EAAE0','#E4C6D0','#F3E065','#83CBD2','#E2637C','#00A0A0','#9BE9FF','#FFACD2','#48C572','#FF9224']; // 12 色
    const MOBILE_MAX_WIDTH = 768; // 小于等于切换为 8x8
    const GRID_PC = 16;
    const GRID_MOBILE = 8;
    const TILE_GAP = 4;

    // DOM
    const gridEl = document.getElementById('grid');
  const scoreEl = document.getElementById('score');
  const personalHighEl = document.getElementById('personalHigh');
    const levelEl = document.getElementById('level');
    const remainingEl = document.getElementById('remaining');
    const newGameBtn = document.getElementById('newGameBtn');
    const hintBtn = document.getElementById('hintBtn');
    const musicToggle = document.getElementById('musicToggle');
    const sfxToggle = document.getElementById('sfxToggle');
    const musicState = document.getElementById('musicState');
    const sfxState = document.getElementById('sfxState');

    // modal
    const rulesModal = document.getElementById('rulesModal');
    const closeRules = document.getElementById('closeRules');
    const dontShow = document.getElementById('dontShow');

    // canvas fx
    const fxCanvas = document.getElementById('fx');
    const fxCtx = fxCanvas.getContext('2d');

    // 音频（WebAudio）
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const masterGain = audioCtx.createGain();
    masterGain.gain.value = 1.0;
    masterGain.connect(audioCtx.destination);

  const sfxGain = audioCtx.createGain(); sfxGain.gain.value = 1.0; sfxGain.connect(masterGain);
  const bgGain = audioCtx.createGain(); bgGain.gain.value = 0.8; bgGain.connect(masterGain);

    let musicOn = (localStorage.getItem('llk_music') !== '0');
    let sfxOn = (localStorage.getItem('llk_sfx') !== '0');

    // 音效：消除音 & 错误音，使用合成
    function playPop(){ if(!sfxOn) return; const now = audioCtx.currentTime; const g = audioCtx.createGain(); g.gain.value = 0.8; g.connect(sfxGain);
      // layered clicks
      const o1 = audioCtx.createOscillator(); o1.type='triangle'; o1.frequency.setValueAtTime(880,now);
      const o2 = audioCtx.createOscillator(); o2.type='sine'; o2.frequency.setValueAtTime(1320,now);
      o1.connect(g); o2.connect(g);
      g.gain.setValueAtTime(0.0001,now); g.gain.exponentialRampToValueAtTime(0.8,now+0.01); g.gain.exponentialRampToValueAtTime(0.001,now+0.25);
      o1.start(now); o2.start(now); o1.stop(now+0.3); o2.stop(now+0.3);
    }
    // softer water-like bubble pop
    function playBubblePopSound(){ if(!sfxOn) return; const now = audioCtx.currentTime; const out = audioCtx.createGain(); out.gain.value = 0.8; out.connect(sfxGain);
      // layered short filtered noise
      const bufferSize = Math.floor(0.5 * audioCtx.sampleRate);
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for(let i=0;i<bufferSize;i++) data[i] = (Math.random()*2-1) * Math.exp(-i/(bufferSize*0.02));
      const src = audioCtx.createBufferSource(); src.buffer = buffer;
      const filter = audioCtx.createBiquadFilter(); filter.type='lowpass'; filter.frequency.value = 1800;
      const g = audioCtx.createGain(); g.gain.value = 0.0001; src.connect(filter); filter.connect(g); g.connect(out);
      g.gain.exponentialRampToValueAtTime(0.5, now+0.01); g.gain.exponentialRampToValueAtTime(0.0001, now+0.5);
      src.start(now); src.stop(now+0.55);
      // small water ripple tone
      const o = audioCtx.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(600, now);
      const og = audioCtx.createGain(); og.gain.value = 0.0001; o.connect(og); og.connect(out);
      og.gain.exponentialRampToValueAtTime(0.18, now+0.01); og.gain.exponentialRampToValueAtTime(0.0001, now+0.45);
      o.start(now); o.stop(now+0.45);
    }
    function playErr(){ if(!sfxOn) return; const now = audioCtx.currentTime; const g = audioCtx.createGain(); g.gain.value = 0.8; g.connect(sfxGain);
      const o = audioCtx.createOscillator(); o.type='sawtooth'; o.frequency.setValueAtTime(220,now);
      const f = audioCtx.createBiquadFilter(); f.type='lowpass'; f.frequency.value = 1200; o.connect(f); f.connect(g);
      g.gain.setValueAtTime(0.0001,now); g.gain.exponentialRampToValueAtTime(0.8,now+0.01); g.gain.exponentialRampToValueAtTime(0.001,now+0.35);
      o.start(now); o.stop(now+0.35);
    }

    // 背景音乐（简单爵士循环合成）
    let bgNodes = [];
    function startBackgroundLoop(){
      if(!musicOn) return;
      stopBackgroundLoop();
      // 生成一个缓慢的和弦进行
      const tempo = 80; const beat = 60/tempo;
      const chords = [ [60,64,67], [57,60,64], [62,65,69], [55,59,62] ];
      const now = audioCtx.currentTime;
      let t = now;
      for(let bar=0;bar<8;bar++){
        const chord = chords[bar % chords.length];
        chord.forEach((n,idx)=>{
          const osc = audioCtx.createOscillator(); osc.type='sine'; osc.frequency.value = 440 * Math.pow(2,(n-69)/12);
          const g = audioCtx.createGain(); g.gain.value = 0.0;
          const lp = audioCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 1200;
          osc.connect(lp); lp.connect(g); g.connect(bgGain);
          osc.start(t + bar*2*beat + idx*0.01);
          g.gain.setValueAtTime(0.0001,t + bar*2*beat); g.gain.exponentialRampToValueAtTime(0.12,t + bar*2*beat + 0.15); g.gain.exponentialRampToValueAtTime(0.0001,t + (bar+1)*2*beat);
          osc.stop(t + (bar+1)*2*beat + 0.05);
          bgNodes.push(osc);
        });
      }
      // loop control: schedule next loop
      bgLoopTimeout = setTimeout(()=>{ if(musicOn) startBackgroundLoop(); }, 8 * 2 * beat * 1000 + 100);
    }
    function stopBackgroundLoop(){ bgNodes.forEach(n=>{ try{ n.stop(); }catch(e){} }); bgNodes=[]; if(window.bgLoopTimeout) clearTimeout(window.bgLoopTimeout); }

    // 音量初始化
    musicState.textContent = musicOn ? '开' : '关';
    sfxState.textContent = sfxOn ? '开' : '关';

    // --- 游戏数据 ---
    let rows,cols; // current grid dims
    let board = []; // padded board for pathfinding
    let tiles = []; // DOM elements
    let size; // number of cells
    let selected = null; // {r,c,el,color}
    let score = 0;
    let level = 1;
    let remaining = 0;
  let personalHigh = parseInt(localStorage.getItem('llk_personal')||'0',10);

    function isMobileSize(){
      // 更可靠的移动设备判定：优先检测 userAgent 中的移动关键词，或检测粗略指针（触控）
      try{
        const uaMobile = /Mobi|Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || '');
        const coarsePointer = (window.matchMedia && window.matchMedia('(pointer:coarse)').matches);
        return uaMobile || coarsePointer || (window.innerWidth <= MOBILE_MAX_WIDTH);
      }catch(e){
        return window.innerWidth <= MOBILE_MAX_WIDTH;
      }
    }

    function setGridSize(){ if(isMobileSize()){ rows=cols=GRID_MOBILE; } else { rows=cols=GRID_PC; } size = rows*cols; }

    // 辅助：坐标到索引
    function idx(r,c){ return r*cols + c; }

    // 创建盘面
    function makeBoard(){
      // 实际 board 为 (rows+2)*(cols+2) 带边界的矩阵，边界为 0（空），内部用 1..12 表示颜色编号或 0 空
      const R = rows+2, C = cols+2;
      board = Array.from({length:R},()=>new Array(C).fill(0));
      // 生成颜色对数量
      const pairs = size/2;
      // prepare color ids list
      const colorIds = [];
      for(let i=0;i<pairs;i++){
        colorIds.push((i % COLORS.length) + 1);
        colorIds.push((i % COLORS.length) + 1);
      }
      // shuffle colorIds
      shuffleArray(colorIds);
      // place into inner board positions
      let k=0;
      for(let r=1;r<=rows;r++){
        for(let c=1;c<=cols;c++){
          board[r][c] = colorIds[k++];
        }
      }
      // ensure at least two removable pairs exist and more than 1 path
      // we'll attempt limited reshuffles to avoid long loops
      let tries=0;
      while((countRemovablePairs()>1) === false && tries<200){ // ensure >1
        shuffleInner(); tries++;
      }
      remaining = size;
    }

    function shuffleInner(){
      // gather inner values
      const vals = [];
      for(let r=1;r<=rows;r++) for(let c=1;c<=cols;c++) vals.push(board[r][c]);
      shuffleArray(vals);
      let k=0;
      for(let r=1;r<=rows;r++) for(let c=1;c<=cols;c++) board[r][c]=vals[k++];
    }

    function shuffleArray(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } }

    // 渲染
    function render(){
      gridEl.innerHTML='';
      gridEl.style.gridTemplateColumns = `repeat(${cols}, minmax(0,1fr))`;
      gridEl.style.gap = TILE_GAP + 'px';
      // size tile by CSS grid; compute tile pixel size? We'll use auto-fit and let CSS handle
      tiles = [];
      for(let r=1;r<=rows;r++){
        for(let c=1;c<=cols;c++){
          const v = board[r][c];
          const el = document.createElement('div');
          el.className='tile';
          el.dataset.r = r; el.dataset.c = c;
          el.style.backgroundColor = v ? COLORS[v-1] : 'transparent';
          if(!v) el.classList.add('hidden');
          el.addEventListener('pointerdown', onTileClick);
          gridEl.appendChild(el);
          tiles.push(el);
        }
      }
      updateStats();
    }

    function onTileClick(e){
      const el = e.currentTarget;
      const r = parseInt(el.dataset.r); const c = parseInt(el.dataset.c);
      const v = board[r][c];
      if(!v) return;
      if(!selected){
        selected = {r,c,el,color:v}; el.classList.add('selected');
      } else if(selected.r===r && selected.c===c){
        // same tile deselect
        el.classList.remove('selected'); selected=null;
      } else {
        const a = {r:selected.r,c:selected.c}, b={r,c};
        if(board[a.r][a.c] === board[b.r][b.c] && canConnect(a,b)){
          // remove
          removePair(a,b);
        } else {
          // error
          playErr();
          selected.el.classList.remove('selected'); selected=null;
          // flash
          el.classList.add('hint'); setTimeout(()=>el.classList.remove('hint'),350);
        }
      }
    }

    function removePair(a,b){
      // play sound
      playPop();
      // animate hide
      const elA = getTileEl(a.r,a.c); const elB = getTileEl(b.r,b.c);
      elA.classList.add('hidden'); elB.classList.add('hidden');
      board[a.r][a.c]=0; board[b.r][b.c]=0;
      remaining -= 2;
      selected && selected.el.classList.remove('selected'); selected=null;
      // score
      score += 10 + Math.floor(level*2);
      updateStats();
      // check win
      if(remaining===0){
        onLevelClear();
      } else {
        // check if any moves left
        if(countRemovablePairs()===0){
          // fail
          setTimeout(()=>onFail(),300);
        }
      }
    }

    function getTileEl(r,c){ const i = (r-1)*cols + (c-1); return tiles[i]; }

  function updateStats(){ scoreEl.textContent = score; levelEl.textContent = level; remainingEl.textContent = remaining; personalHighEl.textContent = personalHigh; }

    // 检测直连、1拐、2拐
    function canConnect(a,b){
      if(a.r===b.r && a.c===b.c) return false;
      // pad board accessible
      // direct
      if(straightClear(a,b)) return true;
      // one turn: check (a.r,b.c) and (b.r,a.c)
      if(oneTurn(a,b)) return true;
      // two turn: iterate rows and cols to find k where path a->k and k->b both straight
      return twoTurn(a,b);
    }

    function straightClear(a,b){
      if(a.r===b.r){
        const r=a.r; const c1=Math.min(a.c,b.c), c2=Math.max(a.c,b.c);
        for(let c=c1+1;c<=c2-1;c++) if(board[r][c]!==0) return false; return true;
      }
      if(a.c===b.c){
        const c=a.c; const r1=Math.min(a.r,b.r), r2=Math.max(a.r,b.r);
        for(let r=r1+1;r<=r2-1;r++) if(board[r][c]!==0) return false; return true;
      }
      return false;
    }
    function oneTurn(a,b){
      // corner at (a.r,b.c)
      if(board[a.r][b.c]===0 && straightClear(a,{r:a.r,c:b.c}) && straightClear({r:a.r,c:b.c},b)) return true;
      if(board[b.r][a.c]===0 && straightClear(a,{r:b.r,c:a.c}) && straightClear({r:b.r,c:a.c},b)) return true;
      return false;
    }
    function twoTurn(a,b){
      // try every row
      for(let r=0;r<=rows+1;r++){
        if(board[r][a.c]===0 && board[r][b.c]===0 && straightClear({r:r,c:a.c},a) && straightClear({r:r,c:b.c},b) && straightClear({r:r,c:a.c},{r:r,c:b.c})){
          return true;
        }
      }
      for(let c=0;c<=cols+1;c++){
        if(board[a.r][c]===0 && board[b.r][c]===0 && straightClear({r:a.r,c:c},a) && straightClear({r:b.r,c:c},b) && straightClear({r:a.r,c:c},{r:b.r,c:c})){
          return true;
        }
      }
      return false;
    }

    // 扫描并返回第一个可消除对，用于提示
    function findAnyPair(){
      for(let r1=1;r1<=rows;r1++){
        for(let c1=1;c1<=cols;c1++){
          const v = board[r1][c1]; if(!v) continue;
          for(let r2=r1;r2<=rows;r2++){
            for(let c2=(r2===r1?c1+1:1);c2<=cols;c2++){
              if(board[r2][c2]===v && canConnect({r:r1,c:c1},{r:r2,c:c2})){
                return [{r:r1,c:c1},{r:r2,c:c2}];
              }
            }
          }
        }
      }
      return null;
    }

    function countRemovablePairs(){
      let cnt=0;
      for(let r1=1;r1<=rows;r1++){
        for(let c1=1;c1<=cols;c1++){
          const v=board[r1][c1]; if(!v) continue;
          for(let r2=r1;r2<=rows;r2++){
            for(let c2=(r2===r1?c1+1:1);c2<=cols;c2++){
              if(board[r2][c2]===v && canConnect({r:r1,c:c1},{r:r2,c:c2})){
                cnt++; if(cnt>2) return cnt; // only need to know >1
              }
            }
          }
        }
      }
      return cnt;
    }

    // 新游戏/重置
    function startNewGame(resetLevel=true){
      if(resetLevel){ level=1; }
      score=0; selected=null;
      setGridSize(); makeBoard(); render(); updateStats();
      // start background music
      if(musicOn) startBackgroundLoop();
    }

    // 提示
    function showHint(){
      const p = findAnyPair(); if(!p){ alert('无可用提示，当前无可消除的配对，游戏失败'); onFail(); return; }
      const e1 = getTileEl(p[0].r,p[0].c); const e2 = getTileEl(p[1].r,p[1].c);
      // stronger visual: add hint and temporary selected state + small pulse animation
      e1.classList.add('hint','selected'); e2.classList.add('hint','selected');
      // slight pulsing via Web Animations for better visibility
      try{
        const a1 = e1.animate([{transform:'scale(1.06)'},{transform:'scale(1.14)'},{transform:'scale(1.06)'}],{duration:800,easing:'ease-in-out'});
        const a2 = e2.animate([{transform:'scale(1.06)'},{transform:'scale(1.14)'},{transform:'scale(1.06)'}],{duration:800,easing:'ease-in-out'});
      }catch(e){}
      // optional sound cue
      playPop();
      setTimeout(()=>{ e1.classList.remove('hint','selected'); e2.classList.remove('hint','selected'); },1000);
    }

    // 关卡完成 — 显示覆盖层并启动每秒礼花直至玩家点击下一关或重新开始
    let levelFireworkInterval = null;
    function playFireworkSound(){ if(!sfxOn) return; const now = audioCtx.currentTime; const localGain = audioCtx.createGain(); localGain.gain.value = 0.35; localGain.connect(sfxGain);
      // gentle bell-like chord
      const freqs = [520, 780, 1040];
      freqs.forEach((f,i)=>{
        const o = audioCtx.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(f, now + i*0.002);
        const g = audioCtx.createGain(); g.gain.setValueAtTime(0.0001, now);
        o.connect(g); g.connect(localGain);
        g.gain.exponentialRampToValueAtTime(0.45, now+0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, now+0.9);
        o.start(now); o.stop(now+1.0);
      });
      // soft noise pop
      const noiseGain = audioCtx.createGain(); noiseGain.gain.value = 0.0001; noiseGain.connect(localGain);
      const bufferSize = Math.floor(0.7 * audioCtx.sampleRate);
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for(let i=0;i<bufferSize;i++) data[i] = (Math.random()*2-1) * Math.exp(-i/(bufferSize*0.02));
      const src = audioCtx.createBufferSource(); src.buffer = buffer; src.connect(noiseGain);
      noiseGain.gain.exponentialRampToValueAtTime(0.08, now+0.01); noiseGain.gain.exponentialRampToValueAtTime(0.0001, now+0.6);
      src.start(now); src.stop(now+0.7);
    }

    function startLevelFireworks(){
      if(levelFireworkInterval) return;
      // immediate burst then periodic
      fireworkBurst(); playFireworkSound();
      levelFireworkInterval = setInterval(()=>{ fireworkBurst(); playFireworkSound(); }, 1000);
    }
    function stopLevelFireworks(){ if(levelFireworkInterval){ clearInterval(levelFireworkInterval); levelFireworkInterval=null; } }

    function onLevelClear(){
      // celebratory sound and save personal high
      playPop();
      personalHigh = Math.max(personalHigh, score); localStorage.setItem('llk_personal', personalHigh);
      updateStats();
      // show overlay and start continuous fireworks
      const overlay = document.getElementById('levelClear'); overlay.style.display = 'flex';
      startLevelFireworks();
    }

    function onFail(){
      playErr();
      alert('无可用步或者失败，游戏回到第一关');
      // reset to level 1
      startNewGame(true);
    }

    // 画布与烟花
    let particles = [];
    function resizeCanvas(){ fxCanvas.width = innerWidth; fxCanvas.height = innerHeight; }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();

    function fireworkBurst(){
      const cx = Math.random()*(fxCanvas.width*0.6)+fxCanvas.width*0.2;
      const cy = Math.random()*(fxCanvas.height*0.4)+fxCanvas.height*0.2;
      const count = 60;
      const colors = COLORS.concat(['#fff']);
      for(let i=0;i<count;i++){
        particles.push({x:cx,y:cy, vx:(Math.random()-0.5)*6, vy:(Math.random()-0.9)*6, life:Math.random()*80+40, c:colors[Math.floor(Math.random()*colors.length)]});
      }
    }
    function animParticles(){
      fxCtx.clearRect(0,0,fxCanvas.width,fxCanvas.height);
      for(let i=particles.length-1;i>=0;i--){
        const p = particles[i]; p.life -= 1; p.vy += 0.12; p.x += p.vx; p.y += p.vy;
        fxCtx.globalAlpha = Math.max(0,p.life/120);
        fxCtx.fillStyle = p.c; fxCtx.beginPath(); fxCtx.arc(p.x,p.y,Math.max(1,Math.min(3,p.life/10)),0,Math.PI*2); fxCtx.fill();
        if(p.life<=0){ particles.splice(i,1); }
      }
      requestAnimationFrame(animParticles);
    }
    requestAnimationFrame(animParticles);

    // UI handlers
    newGameBtn.addEventListener('click', ()=>{ if(!confirm('确定要开始新游戏并回到第一关吗？')) return; startNewGame(true); });
    hintBtn.addEventListener('click', ()=>{ showHint(); });
    musicToggle.addEventListener('click', ()=>{
      musicOn = !musicOn; localStorage.setItem('llk_music', musicOn? '1':'0'); musicState.textContent = musicOn? '开':'关'; if(musicOn) startBackgroundLoop(); else stopBackgroundLoop();
    });
    sfxToggle.addEventListener('click', ()=>{ sfxOn = !sfxOn; localStorage.setItem('llk_sfx', sfxOn? '1':'0'); sfxState.textContent = sfxOn? '开':'关'; });

    // level clear overlay buttons
    const nextLevelBtn = document.getElementById('nextLevelBtn');
    const restartBtn = document.getElementById('restartBtn');
    nextLevelBtn.addEventListener('click', ()=>{
      // stop fireworks and hide overlay, advance level
      stopLevelFireworks(); document.getElementById('levelClear').style.display='none';
      level++; score += 50 + Math.floor(level*10);
      setGridSize(); makeBoard(); render(); updateStats();
    });
    restartBtn.addEventListener('click', ()=>{
      stopLevelFireworks(); document.getElementById('levelClear').style.display='none';
      startNewGame(true);
    });

    // rules modal first time
    function showRulesIfFirst(){ const seen = localStorage.getItem('llk_seen_rules'); if(!seen){ rulesModal.style.display='flex'; } }
    closeRules.addEventListener('click', ()=>{ if(dontShow.checked){ localStorage.setItem('llk_seen_rules','1'); } rulesModal.style.display='none'; // resume audio
      // ensure audio context resumed
      try{ audioCtx.resume(); }catch(e){}
      startNewGame(true);
    });

    // hint via scanning
    // ensure board has more than 1 solution at start

    // 双指支持 & 防止选中拖动
    document.addEventListener('touchmove', e=>{ if(e.touches.length>1) e.preventDefault(); }, {passive:false});

    // ensure audio context resume on first interaction
    document.addEventListener('pointerdown', function resume(){ try{ audioCtx.resume(); }catch(e){} document.removeEventListener('pointerdown',resume); }, {once:true});

    // 在初始化之前，处理窗口大小改变时切换网格尺寸
    let prevIsMobile = isMobileSize();
    window.addEventListener('resize', ()=>{
      const nowMobile = isMobileSize(); if(nowMobile !== prevIsMobile){ prevIsMobile = nowMobile; // restart to adapt
        if(nowMobile){ stopBubbles(); } else { startBubbles(); }
        startNewGame(true);
      }
    });

  // initialize highs (仅个人最高分)
  personalHigh = Math.max(personalHigh,0);
  // show modal or start
  personalHighEl.textContent = personalHigh;
    showRulesIfFirst();
    // If rules are already seen, start immediately
    if(localStorage.getItem('llk_seen_rules')){ startNewGame(true); }

    // 提示按钮快捷键 H
    document.addEventListener('keydown',(e)=>{ if(e.key.toLowerCase()==='h'){ showHint(); } if(e.key.toLowerCase()==='n'){ if(confirm('开始新游戏?')) startNewGame(true); } });

    // --- bubble generation (background floatable bubbles) ---
    const bubblesRoot = document.getElementById('bubbles');
    function randMacaronColor(){
      // 马卡龙色系预设，鲜明但柔和
      const palette = [
        '#FFC1CC', // pastel pink
        '#FFD6A5', // pastel apricot
        '#FFF1A8', // pastel lemon
        '#C8F7D6', // pastel mint
        '#B8E0FF', // pastel sky
        '#E9C9FF', // pastel lavender
        '#FFD1E8', // pastel rose
        '#FFE7C7', // pastel peach
        '#DFF3F5', // pastel aqua
        '#F6E9B4'  // pastel butter
      ];
      return palette[Math.floor(Math.random()*palette.length)];
    }
    function spawnBubble(){
      const b = document.createElement('div'); b.className='bubble';
      const size = Math.floor(Math.random()*36)+28; // 28-64px
      b.style.width = size+'px'; b.style.height = size+'px';
      // spawn only on left or right side strips to avoid covering central board
      const side = Math.random() < 0.5 ? 'left' : 'right';
      let left;
      if(side === 'left'){
        left = Math.random()*10 + 2; // 2% - 12%
      } else {
        left = 88 + Math.random()*10; // 88% - 98%
      }
      b.style.left = left+'%';
      b.style.bottom = (-8 - Math.random()*6) + '%';
      const dur = Math.random()*12 + 8; // 8-20s
      b.style.animation = `bubbleFloat ${dur}s linear forwards`;
      b.style.background = randMacaronColor();
      b.style.opacity = 0.95;
      // allow clicking/touch - bubble itself accepts events
      const popBubble = (ev)=>{ ev.stopPropagation(); if(b.classList.contains('pop')) return; b.classList.add('pop');
        // create fragments positioned by screen coordinates for reliable animation
        const bRect = b.getBoundingClientRect();
        const rootRect = bubblesRoot.getBoundingClientRect();
        for(let i=0;i<8;i++){
          const frag = document.createElement('div'); frag.className='bubble-frag';
          const fs = Math.max(6, Math.floor(size/5)); frag.style.width = fs+'px'; frag.style.height = fs+'px';
          // position centered at bubble
          const startX = Math.round(bRect.left + bRect.width/2 - fs/2 - rootRect.left);
          const startY = Math.round(bRect.top + bRect.height/2 - fs/2 - rootRect.top);
          frag.style.left = startX + 'px'; frag.style.top = startY + 'px';
          frag.style.background = b.style.background;
          frag.style.opacity = 1; frag.style.transform = 'translate(0,0) scale(1)';
          bubblesRoot.appendChild(frag);
          // animate outwards
          (function(f,sz){
            requestAnimationFrame(()=>{
              const dx = (Math.random()-0.5) * (80 + Math.random()*120);
              const dy = - (60 + Math.random()*160);
              f.style.transform = `translate(${dx}px, ${dy}px) scale(${0.5 + Math.random()*0.9})`;
              f.style.opacity = 0;
            });
            setTimeout(()=>{ try{ f.remove() }catch(e){} },700);
          })(frag,fs);
        }
        playBubblePopSound(); setTimeout(()=>{ try{ b.remove() }catch(e){} },320);
      };
      b.addEventListener('pointerdown', popBubble, {passive:true});
      bubblesRoot.appendChild(b);
      // remove when animation ends
      b.addEventListener('animationend', ()=>{ try{ b.remove() }catch(e){} });
    }
  // spawn periodically (disabled on mobile)
  let bubbleTimer = null;
  function startBubbles(){
    if(isMobileSize()) return;
    if(bubbleTimer) return;
    // spawn a few initially
    for(let i=0;i<6;i++){ setTimeout(spawnBubble, i*300); }
    bubbleTimer = setInterval(()=>{ try{ spawnBubble(); }catch(e){} }, 900);
  }
  function stopBubbles(){ if(bubbleTimer){ clearInterval(bubbleTimer); bubbleTimer=null; } // remove existing bubbles
    try{ const nodes = document.querySelectorAll('.bubbles .bubble'); nodes.forEach(n=>n.remove()); const frags = document.querySelectorAll('.bubbles .bubble-frag'); frags.forEach(n=>n.remove()); }catch(e){}
  }
  // start or stop depending on initial size
  if(!isMobileSize()) startBubbles();

    // 在关闭页面时保存分数
  window.addEventListener('beforeunload', ()=>{ personalHigh = Math.max(personalHigh,score); localStorage.setItem('llk_personal', personalHigh); });

    // 小型测试/确保起始盘面有多条可清路
    // 我们在 makeBoard 中通过重排确保 countRemovablePairs()>1

    // expose some utilities for hint/AI (internal)
    window.llk = { findAnyPair }; // for debugging

  // 说明：本实现仅保存在本机的个人最高分。如需多人/全球排行，需要后端服务支持。

  })();
  </script>
</body>
